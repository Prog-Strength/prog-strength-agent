# Reusable macro-accuracy eval. Called by this repo's eval.yml (PRs +
# main-branch baseline runs) and by prog-strength-mcp's /
# prog-strength-api's eval.yml (their PRs, passing mcp_ref / api_ref).
# Runs in the CALLER's repository context, so the sticky comment lands
# on the caller's PR with the caller's token.
#
# See prog-strength-docs/sows/custom-meal-macro-accuracy.md.
name: Macro Eval (reusable)

on:
  workflow_call:
    inputs:
      agent_ref:
        type: string
        default: main
      mcp_ref:
        type: string
        default: main
      api_ref:
        type: string
        default: main
      # main-branch runs publish their results as the eval-baseline
      # artifact and append a line to evals/history.jsonl.
      publish_baseline:
        type: boolean
        default: false
      trials:
        type: number
        default: 3
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      FATSECRET_CLIENT_ID:
        required: false
      FATSECRET_CLIENT_SECRET:
        required: false
      USDA_FDC_API_KEY:
        required: false

permissions:
  contents: write       # history.jsonl commit on main-branch runs
  pull-requests: write  # sticky eval comment
  actions: read         # baseline artifact download

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AGENT_REPO: Prog-Strength/prog-strength-agent
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out agent
        uses: actions/checkout@v4
        with:
          repository: Prog-Strength/prog-strength-agent
          ref: ${{ inputs.agent_ref }}
          path: agent

      - name: Check out mcp
        uses: actions/checkout@v4
        with:
          repository: Prog-Strength/prog-strength-mcp
          ref: ${{ inputs.mcp_ref }}
          path: mcp

      - name: Check out api
        uses: actions/checkout@v4
        with:
          repository: Prog-Strength/prog-strength-api
          ref: ${{ inputs.api_ref }}
          path: api

      - uses: astral-sh/setup-uv@v5

      # The eval runs the REAL Go API (built from the api checkout) so
      # the lookup endpoint + durable cache are exercised end-to-end.
      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Sync dependencies
        run: |
          uv sync --project agent
          uv sync --project mcp

      - name: Run eval
        working-directory: agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FATSECRET_CLIENT_ID: ${{ secrets.FATSECRET_CLIENT_ID }}
          FATSECRET_CLIENT_SECRET: ${{ secrets.FATSECRET_CLIENT_SECRET }}
          USDA_FDC_API_KEY: ${{ secrets.USDA_FDC_API_KEY }}
        run: |
          uv run python -m evals.run_eval \
            --dataset evals/dataset/custom_meals.json \
            --api-path ../api \
            --mcp-path ../mcp \
            --trials ${{ inputs.trials }} \
            --concurrency 4 \
            --out eval-results.json \
            --summary-out eval-summary.md

      # PR runs compare against the most recent main-branch baseline
      # artifact. Artifacts expire (90d default) — absence is handled
      # by the inline-baseline fallback below, so this never fails.
      - name: Download baseline from latest main run
        id: baseline
        if: ${{ !inputs.publish_baseline }}
        run: |
          set -e
          ARTIFACT_ID=$(gh api "repos/${AGENT_REPO}/actions/artifacts?name=eval-baseline&per_page=20" \
            --jq '[.artifacts[] | select(.expired | not)] | sort_by(.created_at) | last | .id // empty' || true)
          if [ -n "${ARTIFACT_ID}" ]; then
            gh api "repos/${AGENT_REPO}/actions/artifacts/${ARTIFACT_ID}/zip" > baseline.zip
            mkdir -p baseline && unzip -o baseline.zip -d baseline
            mv baseline/eval-results.json baseline/eval-baseline.json 2>/dev/null || true
            if [ -f baseline/eval-baseline.json ]; then
              echo "found=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "found=false" >> "$GITHUB_OUTPUT"

      # Self-healing fallback (SOW): no published baseline → run the
      # eval once more at main/main and use that. Slower, but a PR
      # never goes uncompared.
      - name: Check out main for inline baseline
        if: ${{ !inputs.publish_baseline && steps.baseline.outputs.found != 'true' }}
        uses: actions/checkout@v4
        with:
          repository: Prog-Strength/prog-strength-agent
          ref: main
          path: agent-base

      - name: Check out mcp main for inline baseline
        if: ${{ !inputs.publish_baseline && steps.baseline.outputs.found != 'true' }}
        uses: actions/checkout@v4
        with:
          repository: Prog-Strength/prog-strength-mcp
          ref: main
          path: mcp-base

      - name: Check out api main for inline baseline
        if: ${{ !inputs.publish_baseline && steps.baseline.outputs.found != 'true' }}
        uses: actions/checkout@v4
        with:
          repository: Prog-Strength/prog-strength-api
          ref: main
          path: api-base

      - name: Run inline baseline eval
        if: ${{ !inputs.publish_baseline && steps.baseline.outputs.found != 'true' }}
        working-directory: agent-base
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FATSECRET_CLIENT_ID: ${{ secrets.FATSECRET_CLIENT_ID }}
          FATSECRET_CLIENT_SECRET: ${{ secrets.FATSECRET_CLIENT_SECRET }}
          USDA_FDC_API_KEY: ${{ secrets.USDA_FDC_API_KEY }}
        run: |
          mkdir -p ../baseline
          uv sync
          uv sync --project ../mcp-base
          # || true: a broken main must not fail the PR's eval — the
          # comparison just renders without a baseline.
          uv run python -m evals.run_eval \
            --dataset evals/dataset/custom_meals.json \
            --api-path ../api-base \
            --mcp-path ../mcp-base \
            --trials ${{ inputs.trials }} \
            --concurrency 4 \
            --out ../baseline/eval-baseline.json \
            --summary-out /dev/null \
          || true

      - name: Render comparison
        working-directory: agent
        run: |
          uv run python -m evals.compare \
            --current eval-results.json \
            --baseline ../baseline/eval-baseline.json \
            --out eval-summary.md

      # One sticky comment per PR, keyed on the <!-- macro-eval -->
      # marker; later pushes update it in place instead of stacking.
      - name: Upsert PR comment
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          set -e
          PR=${{ github.event.pull_request.number }}
          EXISTING=$(gh api "repos/${{ github.repository }}/issues/${PR}/comments" --paginate \
            --jq '[.[] | select(.body | startswith("<!-- macro-eval -->"))][0].id // empty')
          if [ -n "${EXISTING}" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${EXISTING}" \
              -F body=@agent/eval-summary.md
          else
            gh api "repos/${{ github.repository }}/issues/${PR}/comments" \
              -F body=@agent/eval-summary.md
          fi

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.run_id }}
          path: agent/eval-results.json

      - name: Publish baseline artifact
        if: ${{ inputs.publish_baseline }}
        uses: actions/upload-artifact@v4
        with:
          name: eval-baseline
          path: agent/eval-results.json

      # The durable track record: one JSONL line per main-branch run,
      # committed back so it outlives artifact expiry. [skip ci] +
      # the eval.yml path negation keep this from re-triggering
      # anything; a push race with a human merge just skips the
      # history line (continue-on-error) rather than failing the run.
      - name: Append history.jsonl
        if: ${{ inputs.publish_baseline }}
        continue-on-error: true
        working-directory: agent
        run: |
          uv run python -m evals.compare \
            --current eval-results.json --history-line >> evals/history.jsonl
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evals/history.jsonl
          git commit -m "chore(eval): record results for ${GITHUB_SHA::7} [skip ci]"
          git push origin HEAD:main
