# Squash-merge makes the PR title the commit subject on main, and
# semantic-release derives releases from those subjects — so a
# non-conventional title silently skips the release/deploy (this bit
# us on #8). Mirrors prog-strength-api's check.
name: PR title

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  pr-title:
    name: Conventional commit PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # feat→minor, fix→patch, everything else→no release.
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            perf
            build
            ci
            style
            revert
          subjectPattern: ^[a-z].*$
          subjectPatternError: PR title subject must start with a lowercase letter to match the conventional-commit style semantic-release expects.
